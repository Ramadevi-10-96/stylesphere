<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleSphere - Fashion Lookbook with Cart</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #fff7fb;
            --card-bg: #ffffff;
            --text-color: #333333;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        body.dark {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #eeeeee;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .navbar {
            background: var(--card-bg);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Cart Icon */
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            background: none;
            border: none;
            color: var(--text-color);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
            min-width: 18px;
        }

        .nav-btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .login-btn {
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
        }

        .register-btn {
            background: transparent;
            border: 2px solid #c06cff;
            color: var(--text-color);
        }

        .dark-toggle {
            background: var(--card-bg);
            border: 1px solid #c06cff;
            font-size: 1.2rem;
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background: var(--card-bg);
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.3);
            z-index: 2001;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 1.5rem;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #ddd;
            margin-bottom: 1rem;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: bold;
            margin-bottom: 0.3rem;
        }

        .cart-item-price {
            color: #c06cff;
            font-weight: bold;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid #ddd;
        }

        .cart-total {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .auth-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .auth-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.8rem 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .auth-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .switch-auth {
            text-align: center;
            margin-top: 1rem;
            cursor: pointer;
            color: #c06cff;
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(192,108,255,0.1));
            border-radius: 30px;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .gender-btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
            transition: transform 0.3s;
        }

        .gender-btn.active {
            background: linear-gradient(135deg, #c06cff, #ff6b6b);
            box-shadow: 0 5px 20px rgba(192,108,255,0.4);
        }

        .gender-btn:hover {
            transform: translateY(-3px);
        }

        .search-section {
            margin: 2rem 0;
            text-align: center;
        }

        #searchInput {
            width: 100%;
            max-width: 400px;
            padding: 0.8rem 1.5rem;
            border: 2px solid #c06cff;
            border-radius: 50px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
        }

        .filters {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: var(--card-bg);
            color: var(--text-color);
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
        }

        .gender-section {
            margin: 3rem 0;
            display: none;
        }

        .gender-section.active {
            display: block;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(192, 108, 255, 0.3);
        }

        .card-image-container {
            position: relative;
            overflow: hidden;
            height: 280px;
            background: linear-gradient(135deg, #ff6b6b20, #c06cff20);
        }

        .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-image-container img {
            transform: scale(1.1);
        }

        .card-overlay {
            position: absolute;
            bottom: -100%;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 2rem 1rem 1rem;
            transition: bottom 0.3s ease;
        }

        .card:hover .card-overlay {
            bottom: 0;
        }

        .card-overlay p {
            color: white;
            font-size: 0.9rem;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
        }

        .card-category {
            color: #c06cff;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        /* Price Styles */
        .price-container {
            margin: 0.5rem 0;
        }

        .current-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #c06cff;
        }

        .original-price {
            font-size: 0.9rem;
            text-decoration: line-through;
            color: #999;
            margin-left: 0.5rem;
        }

        .discount {
            font-size: 0.8rem;
            color: #4caf50;
            margin-left: 0.5rem;
        }

        /* Rating Stars */
        .rating {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin: 0.5rem 0;
        }

        .stars {
            color: #ffc107;
            letter-spacing: 2px;
        }

        .rating-count {
            font-size: 0.8rem;
            color: #999;
        }

        /* Size Selector */
        .size-selector {
            display: flex;
            gap: 0.5rem;
            margin: 0.8rem 0;
            flex-wrap: wrap;
        }

        .size-btn {
            padding: 0.3rem 0.8rem;
            border: 1px solid #c06cff;
            background: transparent;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-color);
            font-size: 0.8rem;
        }

        .size-btn.selected {
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
            border: none;
        }

        /* Color Selector */
        .color-selector {
            display: flex;
            gap: 0.5rem;
            margin: 0.8rem 0;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .color-btn.selected {
            border-color: #333;
            transform: scale(1.1);
            box-shadow: 0 0 0 2px var(--bg-color), 0 0 0 4px #c06cff;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .view-btn, .add-to-cart-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .view-btn {
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
        }

        .add-to-cart-btn {
            background: transparent;
            border: 2px solid #c06cff;
            color: #c06cff;
        }

        .add-to-cart-btn:hover {
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
        }

        .like-btn {
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.3s;
            padding: 0 0.5rem;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            background: var(--card-bg);
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .image-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: linear-gradient(135deg, #ff6b6b, #c06cff);
            color: white;
            font-size: 3rem;
        }
    </style>
    
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.reload()">✨ StyleSphere</div>
        <div class="nav-buttons">
            <button class="cart-icon" onclick="toggleCart()">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </button>
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
            <button class="nav-btn login-btn" onclick="openAuth('login')">Login</button>
            <button class="nav-btn register-btn" onclick="openAuth('register')">Register</button>
        </div>
    </nav>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>🛒 Your Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items" id="cartItems">
            <p style="text-align: center; padding: 2rem;">Your cart is empty</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">Total: ₹<span id="cartTotal">0</span></div>
            <button class="checkout-btn" onclick="checkout()">Checkout →</button>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="auth-container">
            <span class="close-modal" onclick="closeAuth()">&times;</span>
            <h2 id="authTitle">Login</h2>
            <input type="text" id="authName" class="auth-input" placeholder="Full Name" style="display: none;">
            <input type="email" id="authEmail" class="auth-input" placeholder="Email">
            <input type="password" id="authPassword" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()" id="authBtn">Login</button>
            <p class="switch-auth" onclick="switchAuth()" id="switchText">Don't have an account? Register</p>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>✨ StyleSphere</h1>
            <p>Explore Trends for Everyone</p>
            <div class="hero-buttons">
                <button class="gender-btn" onclick="showSection('women')">👩 Women</button>
                <button class="gender-btn" onclick="showSection('men')">👨 Men</button>
                <button class="gender-btn" onclick="showSection('kids')">🧒 Kids</button>
            </div>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Search outfits..." onkeyup="filterCards()">
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="men" onclick="setFilter('men')">Men</button>
            <button class="filter-btn" data-filter="women" onclick="setFilter('women')">Women</button>
            <button class="filter-btn" data-filter="kids" onclick="setFilter('kids')">Kids</button>
            <button class="filter-btn" data-filter="casual" onclick="setFilter('casual')">Casual</button>
            <button class="filter-btn" data-filter="party" onclick="setFilter('party')">Party</button>
            <button class="filter-btn" data-filter="traditional" onclick="setFilter('traditional')">Traditional</button>
        </div>

        <div id="women" class="gender-section">
            <h2 class="section-title">👩 Women's Fashion</h2>
            <div class="cards-grid" id="womenGrid"></div>
        </div>

        <div id="men" class="gender-section">
            <h2 class="section-title">👨 Men's Fashion</h2>
            <div class="cards-grid" id="menGrid"></div>
        </div>

        <div id="kids" class="gender-section">
            <h2 class="section-title">🧒 Kids' Fashion</h2>
            <div class="cards-grid" id="kidsGrid"></div>
        </div>
    </div>

    <div class="footer">
        <p>✨ StyleSphere - Your Fashion Destination ✨</p>
    </div>

            // Kids Outfits (Your images - NOT CHANGED)
            { id: 13, title: "Cute Baby Dress", category: "kids", type: "casual", price: 1299, originalPrice: 1999, rating: 4.7, reviews: 78, image: "https://babiesfrock.in/cdn/shop/products/image_5dbe7219-3994-423f-9985-6f2072282a48.jpg?v=1675062215&width=1500", gender: "kids", sizes: ["2-3Y", "3-4Y", "4-5Y"], colors: ["#ff6b6b", "#c06cff", "#ffe66d"] },
            { id: 14, title: "Kids Party Wear", category: "kids", type: "party", price: 2499, originalPrice: 3999, rating: 4.6, reviews: 45, image: "https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcQT1AwD2xCGctNDwaDG60LrBFz-SoLzKC40-kETyRTClGZherI6sTtqC14oRRPcVwQZaL8oflSJJACgY_Tcik5ds9w0GXLSbMR3Nzdlu7Q", gender: "kids", sizes: ["2-3Y", "3-4Y", "4-5Y"], colors: ["#c06cff", "#ff6b6b", "#4ecdc4"] },
            { id: 15, title: "Traditional Kids Kurta", category: "kids", type: "traditional", price: 2199, originalPrice: 3499, rating: 4.8, reviews: 56, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnIq1z1uP1sjN1WY1LjaeJC_QDKQLTXH5UcA&s", gender: "kids", sizes: ["2-3Y", "3-4Y", "4-5Y"], colors: ["#c06cff", "#f4a460", "#ffd700"] },
            { id: 16, title: "Kids Casual Outfit", category: "kids", type: "casual", price: 1599, originalPrice: 2499, rating: 4.5, reviews: 34, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8aZZo7x52ApjnPR8RzElUQHsF7_YxELwmSQ&s", gender: "kids", sizes: ["2-3Y", "3-4Y", "4-5Y"], colors: ["#4ecdc4", "#ffe66d", "#ff6b6b"] },
            { id: 17, title: "Kids Party Dress", category: "kids", type: "party", price: 2999, originalPrice: 4499, rating: 4.7, reviews: 67, image: "https://www.onefridayworld.com/cdn/shop/articles/party-dress-for-kids_961418d7-5a14-413c-ae78-88856863b158.jpg?v=1750316376", gender: "kids", sizes: ["2-3Y", "3-4Y", "4-5Y"], colors: ["#ff6b6b", "#c06cff", "#ffd700"] },
            { id: 18, title: "Kids Traditional Wear", category: "kids", type: "traditional", price: 2799, originalPrice: 4499, rating: 4.8, reviews: 89, image: "https://m.media-amazon.com/images/I/61BdrRZWgdL._AC_UY350_.jpg", gender: "kids", sizes: ["2-3Y", "3-4Y", "4-5Y"], colors: ["#c06cff", "#f4a460", "#4ecdc4"] }
        ];

        let currentFilter = "all";
        let currentSearch = "";
        let isLoggedIn = false;
        let currentSection = "women";
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        // Store selected sizes and colors per card
        let selectedSizes = {};
        let selectedColors = {};

        // Cart Functions
        function updateCartDisplay() {
            document.getElementById('cartCount').textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = cartTotal;
            
            const cartItemsDiv = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p style="text-align: center; padding: 2rem;">Your cart is empty</p>';
                return;
            }
            
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.title}">
                    <div class="cart-item-details">
                        <div class="cart-item-title">${item.title}</div>
                        <div class="cart-item-price">₹${item.price}</div>
                        <div>Size: ${item.size} | Color: ${item.color}</div>
                        <div>Quantity: ${item.quantity}</div>
                    </div>
                    <button class="cart-item-remove" onclick="removeFromCart(${item.id})">🗑️</button>
                </div>
            `).join('');
        }

        function addToCart(id, size, color) {
            if (!isLoggedIn) {
                alert("Please login first to add items to cart! 🔐");
                openAuth('login');
                return false;
            }
            
            if (!size) {
                alert("Please select a size! 👕");
                return false;
            }
            
            if (!color) {
                alert("Please select a color! 🎨");
                return false;
            }
            
            const outfit = outfits.find(o => o.id === id);
            const existingItem = cart.find(item => item.id === id && item.size === size && item.color === color);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: outfit.id,
                    title: outfit.title,
                    price: outfit.price,
                    image: outfit.image,
                    size: size,
                    color: color,
                    quantity: 1
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartDisplay();
            alert(`✨ ${outfit.title} added to cart!`);
            return true;
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartDisplay();
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }

        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty! 🛒");
                return;
            }
            alert("🎉 Thank you for shopping with StyleSphere!\n\nYour order has been placed successfully!\nTotal: ₹" + document.getElementById('cartTotal').textContent);
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartDisplay();
            toggleCart();
        }

        function renderStars(rating) {
            const fullStars = Math.floor(rating);
            let stars = '';
            for (let i = 0; i < fullStars; i++) stars += '★';
            for (let i = stars.length; i < 5; i++) stars += '☆';
            return stars;
        }

        function showSection(section) {
            currentSection = section;
            
            document.getElementById('women').classList.remove('active');
            document.getElementById('men').classList.remove('active');
            document.getElementById('kids').classList.remove('active');
            
            document.getElementById(section).classList.add('active');
            
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(section === 'women' ? 'Women' : section === 'men' ? 'Men' : 'Kids')) {
                    btn.classList.add('active');
                }
            });
            
            renderCards();
        }

        function renderCards() {
            let filteredOutfits = outfits.filter(outfit => {
                const matchesSearch = outfit.title.toLowerCase().includes(currentSearch.toLowerCase());
                let matchesFilter = true;
                if (currentFilter === "men") matchesFilter = outfit.gender === "men";
                else if (currentFilter === "women") matchesFilter = outfit.gender === "women";
                else if (currentFilter === "kids") matchesFilter = outfit.gender === "kids";
                else if (currentFilter === "casual") matchesFilter = outfit.type === "casual";
                else if (currentFilter === "party") matchesFilter = outfit.type === "party";
                else if (currentFilter === "traditional") matchesFilter = outfit.type === "traditional";
                return matchesSearch && matchesFilter;
            });

            const sectionFiltered = filteredOutfits.filter(o => o.gender === currentSection);
            
            if (currentSection === 'women') {
                renderGrid("womenGrid", sectionFiltered);
            } else if (currentSection === 'men') {
                renderGrid("menGrid", sectionFiltered);
            } else if (currentSection === 'kids') {
                renderGrid("kidsGrid", sectionFiltered);
            }
        }

        function renderGrid(gridId, outfitsArray) {
            const grid = document.getElementById(gridId);
            if (outfitsArray.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">No outfits found 😢</p>';
                return;
            }
            
            grid.innerHTML = outfitsArray.map(outfit => {
                const sizeKey = `${outfit.id}_size`;
                const colorKey = `${outfit.id}_color`;
                const discount = Math.round(((outfit.originalPrice - outfit.price) / outfit.originalPrice) * 100);
                
                return `
                    <div class="card" data-id="${outfit.id}">
                        <div class="card-image-container">
                            <img src="${outfit.image}" alt="${outfit.title}" 
                                 onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'image-placeholder\\'>👗</div>';">
                            <div class="card-overlay">
                                <p>✨ ${outfit.type === 'casual' ? 'Comfort Meets Style' : outfit.type === 'party' ? 'Party Ready!' : 'Traditional Elegance'} ✨</p>
                            </div>
                        </div>
                        <div class="card-content">
                            <div class="card-title">${outfit.title}</div>
                            <div class="card-category">${outfit.type.toUpperCase()} • ${outfit.gender.toUpperCase()}</div>
                            
                            <div class="price-container">
                                <span class="current-price">₹${outfit.price}</span>
                                <span class="original-price">₹${outfit.originalPrice}</span>
                                <span class="discount">(${discount}% OFF)</span>
                            </div>
                            
                            <div class="rating">
                                <span class="stars">${renderStars(outfit.rating)}</span>
                                <span class="rating-count">(${outfit.reviews} reviews)</span>
                            </div>
                            
                            <div class="size-selector">
                                ${outfit.sizes.map(size => `
                                    <button class="size-btn" onclick="selectSize(${outfit.id}, '${size}')">${size}</button>
                                `).join('')}
                            </div>
                            
                            <div class="color-selector">
                                ${outfit.colors.map(color => `
                                    <button class="color-btn" style="background: ${color};" onclick="selectColor(${outfit.id}, '${color}')"></button>
                                `).join('')}
                            </div>
                            
                            <div class="card-actions">
                                <button class="view-btn" onclick="viewStyle(${outfit.id})">View Style</button>
                                <button class="add-to-cart-btn" onclick="addToCart(${outfit.id}, selectedSizes[${outfit.id}], selectedColors[${outfit.id}])">Add to Cart</button>
                                <button class="like-btn" onclick="toggleLike(this)">❤️</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectSize(id, size) {
            selectedSizes[id] = size;
            document.querySelectorAll(`.card[data-id="${id}"] .size-btn`).forEach(btn => {
                btn.classList.remove('selected');
                if (btn.textContent === size) btn.classList.add('selected');
            });
        }

        function selectColor(id, color) {
            selectedColors[id] = color;
            document.querySelectorAll(`.card[data-id="${id}"] .color-btn`).forEach(btn => {
                btn.classList.remove('selected');
                if (btn.style.backgroundColor === color) btn.classList.add('selected');
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderCards();
        }

        function filterCards() {
            currentSearch = document.getElementById('searchInput').value;
            renderCards();
        }

        function viewStyle(id) {
            const outfit = outfits.find(o => o.id === id);
            if (!isLoggedIn) {
                alert("Please login first to view style details! 🔐");
                openAuth('login');
                return;
            }
            
            alert(`✨ ${outfit.title}\n📂 Category: ${outfit.type.toUpperCase()}\n👥 Gender: ${outfit.gender.toUpperCase()}\n💰 Price: ₹${outfit.price}\n⭐ Rating: ${outfit.rating}/5 (${outfit.reviews} reviews)\n\nAvailable Sizes: ${outfit.sizes.join(', ')}\n\nThis outfit is perfect for your next ${outfit.type} event!`);
        }

        function toggleLike(btn) {
            if (!isLoggedIn) {
                alert("Please login to like outfits! ❤️");
                openAuth('login');
                return;
            }
            btn.classList.toggle('liked');
            if (btn.classList.contains('liked')) {
                btn.innerHTML = '❤️';
                alert("✨ Added to your favorites! ✨");
            } else {
                btn.innerHTML = '🤍';
                alert("Removed from favorites");
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const toggle = document.querySelector('.dark-toggle');
            toggle.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        }

        let authMode = 'login';

        function openAuth(mode) {
            authMode = mode;
            const modal = document.getElementById('authModal');
            const title = document.getElementById('authTitle');
            const nameField = document.getElementById('authName');
            const authBtn = document.getElementById('authBtn');
            const switchText = document.getElementById('switchText');
            
            if (mode === 'login') {
                title.textContent = 'Login';
                nameField.style.display = 'none';
                authBtn.textContent = 'Login';
                switchText.textContent = "Don't have an account? Register";
            } else {
                title.textContent = 'Register';
                nameField.style.display = 'block';
                authBtn.textContent = 'Register';
                switchText.textContent = "Already have an account? Login";
            }
            modal.classList.add('active');
        }

        function closeAuth() {
            document.getElementById('authModal').classList.remove('active');
        }

        function switchAuth() {
            if (authMode === 'login') {
                openAuth('register');
            } else {
                openAuth('login');
            }
        }

        function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            
            if (authMode === 'register') {
                const name = document.getElementById('authName').value;
                if (!name || !email || !password) {
                    alert("Please fill all fields! 📝");
                    return;
                }
                localStorage.setItem('user', JSON.stringify({ name, email }));
                alert("Registration Successful! 🎉 Please login.");
                openAuth('login');
            } else {
                if (!email || !password) {
                    alert("Please enter email and password! 📝");
                    return;
                }
                const user = localStorage.getItem('user');
                if (user) {
                    isLoggedIn = true;
                    alert("Login Successful! Welcome to StyleSphere ✨");
                    closeAuth();
                    updateNavButtons();
                } else {
                    alert("No account found! Please register first. 📝");
                }
            }
        }

        function updateNavButtons() {
            const navBtns = document.querySelector('.nav-buttons');
            if (isLoggedIn) {
                const user = JSON.parse(localStorage.getItem('user'));
                navBtns.innerHTML = `
                    <button class="cart-icon" onclick="toggleCart()">🛒 <span class="cart-count" id="cartCount">${cart.reduce((sum, item) => sum + item.quantity, 0)}</span></button>
                    <span style="color: #c06cff;">👤 ${user.name}</span>
                    <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
                    <button class="nav-btn" onclick="logout()">Logout</button>
                `;
            }
        }

        function logout() {
            isLoggedIn = false;
            alert("Logged out successfully! 👋");
            location.reload();
        }

        function checkLoginStatus() {
            const user = localStorage.getItem('user');
            if (user) {
                isLoggedIn = true;
                updateNavButtons();
            }
        }

        checkLoginStatus();
        updateCartDisplay();
        showSection('women');
    </script>
    
</body>
</html>
